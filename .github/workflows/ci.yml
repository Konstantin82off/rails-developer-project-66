name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.2
          bundler-cache: true

      - name: Install dependencies
        run: |
          bundle install

      - name: Setup database
        run: |
          bundle exec rails db:create db:migrate
        env:
          RAILS_ENV: test

      - name: Run tests
        run: |
          bundle exec rails test

      - name: Run RuboCop
        run: |
          bundle exec rubocop
